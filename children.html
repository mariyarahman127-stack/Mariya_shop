<!DOCTYPE html>
<html>
<head>
<title>Children Goods</title>
<style>
body { font-family: Arial; text-align:center; }
.product { display:inline-block; margin:20px; padding:15px; border:1px solid #ccc; }
button { background:green; color:white; padding:10px; border:none; }
</style>
</head>
<body>

<h2>Children's Goods</h2>

<div class="product">
    <h3>Toy Car</h3>
    <p>$10</p>
    <button onclick="buy('Toy Car',10)">Buy</button>
</div>

<script>
function buy(n,p){
    localStorage.setItem("productName",n);
    localStorage.setItem("productPrice",p);
    window.location.href="Buy.html";
}
</script>

</body>
</html>
